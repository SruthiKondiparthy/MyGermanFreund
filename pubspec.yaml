name: mygermanfreund
description: "AI-powered German letter scanner for expats — by Athirikya Solutions"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Image handling
  image: ^4.1.3
  image_picker: ^1.1.2

  # Document Scanner
  doc_scan_flutter: ^1.0.6

  # OCR
  google_mlkit_text_recognition: ^0.15.0

  # Networking
  http: ^1.2.1

  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1

  # Sharing
  share_plus: ^12.0.2

  # Secure Storage
  flutter_secure_storage: ^10.0.0-beta.4

  # Utils
  path_provider: ^2.1.3
  uuid: ^4.5.0
  intl: ^0.20.2

  # add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/MGF_Icon.png
    - assets/MGF_Landingpage.png