name: Docker Images

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: mygermanfreund-backend
            context: ./backend-fastapi
            file: ./backend-fastapi/Dockerfile
          - image: mygermanfreund-web
            context: ./web-ui
            file: ./web-ui/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: prep
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ matrix.image }}:sha-${{ github.sha }}
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ matrix.image }}:latest
