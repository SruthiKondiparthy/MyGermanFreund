name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  web-build:
    name: Web build (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
